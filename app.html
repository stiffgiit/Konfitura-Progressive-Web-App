<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Konfitura</title>
    <link rel="manifest" href="manifest.json">
    <link href="src/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="src/css/leaflet.css">
    <link rel="stylesheet" href="src/css/style.css">
    <meta name="theme-color" content="#d9534f">
</head>
<body>

<header>
    <nav class="navbar custom-navbar mb-4 shadow-sm">
        <div class="container d-flex justify-content-center">
            <span class="navbar-brand mb-0 h1 d-flex align-items-center gap-2 text-white">
                <i class="bi bi-geo-alt-fill fs-3"></i> Konfitura
            </span>
        </div>
    </nav>
</header>

<main class="container pb-4">
    <div class="row g-4">
        <section class="col-12 col-md-6">
            <div class="card app-card h-100">
                <div class="card-body d-flex flex-column text-center">
                    <h5 class="section-title"><i class="bi bi-camera text-primary me-2"></i>Rejestracja obrazu</h5>
                    
                    <div class="media-container mb-4">
                        <video id="videoElement" class="media-element" autoplay playsinline></video>
                        <canvas id="canvasElement" class="d-none media-element"></canvas>
                        <img id="photoPreview" class="d-none media-element" alt="Podgląd zrobionego zdjęcia">
                    </div>

                    <div class="mt-auto">
                        <button id="captureBtn" class="btn btn-primary app-btn w-100 mb-2">
                            <i class="bi bi-camera-fill me-2"></i> Zrób zdjęcie
                        </button>
                        <button id="retakeBtn" class="btn btn-outline-secondary app-btn w-100 d-none">
                            <i class="bi bi-arrow-counterclockwise me-2"></i> Powtórz zdjęcie
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <section class="col-12 col-md-6">
            <div class="card app-card h-100">
                <div class="card-body d-flex flex-column text-center">
                    <h5 class="section-title"><i class="bi bi-pin-map text-danger me-2"></i>Lokalizacja i udostępnianie</h5>
                    
                    <button id="locateBtn" class="btn btn-warning app-btn w-100 mb-3" disabled>
                        <i class="bi bi-crosshair me-2"></i> Pobierz lokalizację GPS
                    </button>
                    
                    <div class="media-container mb-4">
                        <div id="map" class="media-element"></div>
                    </div>

                    <div class="mt-auto">
                        <button id="shareBtn" class="btn btn-success app-btn w-100" disabled>
                            <i class="bi bi-share-fill me-2"></i> Udostępnij zgłoszenie
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </div>
</main>

<div class="modal fade custom-modal" id="infoModal" tabindex="-1" aria-labelledby="infoModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title w-100 text-center fw-bold" id="infoModalLabel">
                    <i class="bi bi-info-circle text-danger fs-1 d-block mb-2"></i>
                    Komunikat
                </h5>
            </div>
            <div class="modal-body text-center text-muted pt-2" id="infoModalBody">
                </div>
            <div class="modal-footer border-0 d-flex justify-content-center">
                <button type="button" class="btn btn-secondary app-btn px-4" data-bs-dismiss="modal">Rozumiem</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade custom-modal" id="desktopShareModal" tabindex="-1" aria-labelledby="desktopShareModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-light border-0">
                <h5 class="modal-title fw-bold" id="desktopShareModalLabel">
                    <i class="bi bi-send-check text-success me-2"></i> Gotowe do wysłania
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Zamknij"></button>
            </div>
            <div class="modal-body">
                <div class="alert alert-success d-flex align-items-center mb-4" role="alert">
                    <i class="bi bi-check-circle-fill fs-4 me-3"></i>
                    <div>Zdjęcie zostało pomyślnie pobrane na Twój dysk.</div>
                </div>
                <p class="text-muted mb-3 fs-6">Wybierz komunikator, do którego chcesz wkleić treść zgłoszenia. <strong>Pamiętaj, aby ręcznie załączyć pobrane przed chwilą zdjęcie.</strong></p>
                
                <div class="d-grid gap-3">
                    <a id="btnShareWhatsApp" href="#" target="_blank" class="btn btn-success app-btn d-flex align-items-center justify-content-center gap-2">
                        <i class="bi bi-whatsapp fs-5"></i> Otwórz WhatsApp Web
                    </a>
                    <a id="btnShareEmail" href="#" target="_blank" class="btn btn-outline-dark app-btn d-flex align-items-center justify-content-center gap-2">
                        <i class="bi bi-envelope-at fs-5"></i> Wyślij e-mail
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="src/js/leaflet.js"></script>
<script src="src/js/bootstrap.bundle.min.js"></script>
<script src="src/js/app.js"></script>
</body>
</html>
