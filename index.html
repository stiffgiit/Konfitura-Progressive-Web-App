<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfitura</title>
    <link rel="manifest" href="manifest.json">
    <link href="src/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="src/css/leaflet.css">
    <link rel="stylesheet" href="src/css/style.css">
    <meta name="theme-color" content="#d9534f">
</head>
<body class="bg-light">
<header>
    <nav class="navbar navbar-dark bg-danger mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Konfitura</span>
        </div>
    </nav>
</header>

<main class="container">
    <div class="row">
        <section class="col-12 col-md-6 mb-4">
            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <video id="videoElement" class="w-100 bg-dark rounded mb-3" autoplay playsinline></video>
                    <canvas id="canvasElement" class="d-none w-100 rounded mb-3"></canvas>
                    <img id="photoPreview" class="d-none w-100 rounded mb-3"
                         alt="Podgląd zrobionego zdjęcia zgłoszenia">
                    <button id="captureBtn" class="btn btn-primary w-100 mb-2">Zrób zdjęcie</button>
                    <button id="retakeBtn" class="btn btn-secondary w-100 d-none">Powtórz zdjęcie</button>
                </div>
            </div>
        </section>

        <section class="col-12 col-md-6 mb-4">
            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <button id="locateBtn" class="btn btn-warning w-100 mb-3" disabled>Pobierz lokalizację GPS</button>
                    <div id="map" class="w-100 rounded bg-secondary mb-3"></div>
                    <button id="shareBtn" class="btn btn-success w-100" disabled>Udostępnij zgłoszenie</button>
                </div>
            </div>
        </section>
    </div>
</main>

<div class="modal fade" id="infoModal" tabindex="-1" aria-labelledby="infoModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title" id="infoModalLabel">Komunikat</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Zamknij"></button>
            </div>
            <div class="modal-body" id="infoModalBody">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Zamknij</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="desktopShareModal" tabindex="-1" aria-labelledby="desktopShareModalLabel"
     aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="desktopShareModalLabel">Udostępnij zgłoszenie</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Zamknij"></button>
            </div>
            <div class="modal-body">
                <p class="text-success fw-bold">1. Zdjęcie zostało pomyślnie pobrane na dysk.</p>
                <p>2. Wybierz komunikator, do którego chcesz wkleić treść zgłoszenia (pamiętaj, aby ręcznie załączyć
                    pobrane zdjęcie):</p>
                <div class="d-grid gap-2">
                    <a id="btnShareWhatsApp" href="#" target="_blank" class="btn btn-success">Otwórz WhatsApp Web</a>
                    <a id="btnShareEmail" href="#" target="_blank" class="btn btn-secondary">Wyślij E-mail</a>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Zamknij</button>
            </div>
        </div>
    </div>
</div>

<script src="src/js/leaflet.js"></script>
<script src="src/js/bootstrap.bundle.min.js"></script>
<script src="src/js/app.js"></script>
</body>
</html>
